<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Schedule Meme</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212; /* Dark theme so the meme pops */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            width: 500px; /* Limits size on desktop, stays responsive on mobile */
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .meme-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
        .footer-text {
            color: #aaaaaa;
            font-size: 0.85rem;
            margin-top: 12px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="auv3n6.jpg" alt="July Report Meme" class="meme-img">
        <div class="footer-text">POV: Checking the defense/presentation lineup...</div>
    </div>

</body>
</html>
